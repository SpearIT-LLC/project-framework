# framework.yaml
# Project configuration for AI assistants and tooling

project:
  name: "SpearIT Project Framework"
  type: framework
  deliverable: documentation

# Release configuration — used by /fw-release command
# fw-release              → uses default_product archive_path
# fw-release plugin-full  → uses plugin-full archive_path
# fw-release plugin-light → uses plugin-light archive_path
release:
  default_product: framework
  products:
    - id: framework
      label: "SpearIT Project Framework"
      priority: 1
      archive_path: "history/releases/framework"
      status_file: "framework/PROJECT-STATUS.md"
      changelog_file: "framework/CHANGELOG.md"
      build_script: "tools/Build-FrameworkArchive.ps1"
    - id: plugin-full
      label: "SpearIT Framework Full Plugin"
      priority: 2
      archive_path: "history/releases/plugin-full"
      status_file: "plugins/spearit-framework/PROJECT-STATUS.md"
      changelog_file: "plugins/spearit-framework/CHANGELOG.md"
      build_script: "tools/Build-Plugin.ps1 -Plugin spearit-framework"
    - id: plugin-light
      label: "SpearIT Framework Light Plugin"
      priority: 3
      archive_path: "history/releases/plugin-light"
      status_file: "plugins/spearit-framework-light/PROJECT-STATUS.md"
      changelog_file: "plugins/spearit-framework-light/CHANGELOG.md"
      build_script: "tools/Build-Plugin.ps1 -Plugin spearit-framework-light"

policies:
  workflow: framework/docs/collaboration/workflow-guide.md
  onTransition: framework/docs/collaboration/workflow-guide.md#workflow-transitions

roles:
  definitions: framework/docs/ref/framework-roles.yaml
  default: senior-architect

# Source-of-truth index for framework topics
# Use /fw-topic-index or Get-FrameworkIndex.ps1 for human-friendly output
sources:
  # Workflow & Process
  workflow-process: framework/docs/collaboration/workflow-guide.md#development-workflow-phases
  workflow-transitions: framework/docs/collaboration/workflow-guide.md#workflow-transitions
  work-item-numbering: framework/docs/collaboration/workflow-guide.md#work-item-numbering
  work-item-templates: framework/docs/collaboration/workflow-guide.md#work-item-templates
  git-workflow: framework/docs/collaboration/workflow-guide.md#git-workflow
  versioning: framework/docs/collaboration/workflow-guide.md#versioning--releases
  release-process: framework/docs/process/version-control-workflow.md#release-checklist
  issue-response: framework/docs/process/version-control-workflow.md#issue-response-process
  planning: framework/docs/collaboration/workflow-guide.md#planning-guidelines
  session-history: framework/docs/collaboration/workflow-guide.md#session-history
  adr-process: framework/docs/collaboration/workflow-guide.md#architecture-decision-records-adrs
  research-phase: framework/docs/collaboration/workflow-guide.md#research-phase
  collaboration: framework/docs/collaboration/workflow-guide.md#collaboration-practices
  documentation-standards: framework/docs/collaboration/workflow-guide.md#documentation-standards

  # Standards & Policies
  code-quality: framework/docs/collaboration/code-quality-standards.md
  testing: framework/docs/collaboration/testing-strategy.md
  security: framework/docs/collaboration/security-policy.md
  architecture: framework/docs/collaboration/architecture-guide.md
  troubleshooting: framework/docs/collaboration/troubleshooting-guide.md
  dry-principles: framework/docs/collaboration/documentation-dry-principles.md

  # AI Collaboration
  ai-reading-protocol: framework/CLAUDE.md#ai-reading-protocol
  ai-roles: framework/docs/ref/framework-roles.yaml
  ai-checkpoint-policy: framework/CLAUDE.md#ai-workflow-checkpoint-policy-critical---adr-001

  # Project Structure
  project-structure: framework/docs/PROJECT-STRUCTURE-STANDARD.md
  repository-structure: framework/docs/REPOSITORY-STRUCTURE.md

  # Templates & Setup
  new-project-setup: templates/NEW-PROJECT-CHECKLIST.md

  # Patterns
  pattern-cmd-wrappers: framework/docs/patterns/cmd-wrappers.md
  pattern-powershell-modules: framework/docs/patterns/powershell-modules.md
  pattern-config-management: framework/docs/patterns/config-management.md
